<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Monitor Pro v78</title>
    <script src="https://unpkg.com/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --bg: #f6f8fc;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --line: #e5eaf3;
            --line-strong: #d8dfec;
            --text: #142033;
            --muted: #667085;
            --subtle: #8a95a8;
            --primary: #635bff;
            --primary-strong: #4f46e5;
            --primary-soft: #eeebff;
            --green: #23a36b;
            --green-soft: #e9f8f0;
            --red: #e64965;
            --red-soft: #fff0f3;
            --blue: #2563eb;
            --shadow: 0 14px 40px rgba(28, 39, 64, .08);
            --shadow-soft: 0 8px 24px rgba(28, 39, 64, .06);
        }

        * { box-sizing: border-box; }
        html { min-height: 100%; background: var(--bg); -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 24% 12%, rgba(99, 91, 255, .06), transparent 28%),
                linear-gradient(180deg, #fbfcff 0%, var(--bg) 34%, #f7f9fd 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            font-size: 14px;
            line-height: 1.45;
            letter-spacing: 0;
        }

        button, input, textarea, select {
            font: inherit;
            color: inherit;
            letter-spacing: 0;
        }

        button {
            border: 0;
            cursor: pointer;
            background: transparent;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: .55;
        }

        svg { width: 18px; height: 18px; display: block; }
        .app-shell { min-height: 100vh; display: grid; grid-template-columns: 256px minmax(0, 1fr); }

        .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            padding: 18px 16px;
            background: rgba(255, 255, 255, .88);
            border-right: 1px solid var(--line);
            backdrop-filter: blur(18px);
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 38px;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: linear-gradient(145deg, #776cff, #493ee7);
            color: #fff;
            display: grid;
            place-items: center;
            box-shadow: 0 10px 22px rgba(99, 91, 255, .28);
        }

        .brand-title { font-size: 20px; font-weight: 750; }
        .brand-version { color: var(--primary); font-size: 15px; font-weight: 650; border-left: 1px solid #cfd6e4; padding-left: 8px; }

        .nav-list { display: flex; flex-direction: column; gap: 8px; }
