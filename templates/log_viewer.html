<!DOCTYPE html>
<html lang="zh-CN" class="theme-light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>消息记录</title>
<!--
  Telegram Web A UI subset for the read-only log viewer.

  Source project: https://github.com/Ajaxy/telegram-tt (Telegram Web A, GPL-3.0)
  Source files mirrored/adapted into plain HTML/CSS class structure here:
  - src/components/main/Main.scss (#Main, #LeftColumn, #MiddleColumn layout)
  - src/components/middle/message/Message.scss (.Message, .message-content, grouping/own classes)
  - src/components/middle/message/MessageContextMenu.scss (.MessageContextMenu, .bubble menu shell)

  This template only maps local /log_db and /log_groups data into Telegram Web A's UI shell.
  Message sending, Telegram auth, MTProto, composer, media, reactions and other client features are intentionally omitted.
-->
<style>
:root {
  --vh: 1vh;
  --color-primary: #3390ec;
  --color-primary-shade: #2f84d9;
  --color-background: #ffffff;
  --color-background-compact-menu: rgba(255, 255, 255, 0.92);
  --color-background-own: #eeffde;
  --color-background-own-apple: #dcf8c6;
  --color-background-selected: #e6f2ff;
  --color-background-own-selected: #d4f3c4;
  --color-chat-background: #e7ebee;
  --color-text: #000000;
  --color-text-secondary: #707579;
  --color-text-meta: #7d8287;
  --color-borders: #dfe1e5;
  --color-chat-hover: #f4f4f5;
  --color-reply-hover: #f1f8ff;
  --color-reply-own-hover: #dff7d8;
  --color-reply-active: #d7ebff;
  --color-reply-own-active: #ccefbf;
  --color-message-meta-own: #4fae4e;
  --color-default-shadow: rgba(0, 0, 0, 0.20);
  --border-radius-default: 0.75rem;
  --border-radius-messages: 0.75rem;
  --border-radius-messages-small: 0.25rem;
  --layer-transition: 200ms ease;
  --select-transition: 180ms ease;
  --z-menu: 20;
}
* { box-sizing: border-box; }
html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 16px;
  color: var(--color-text);
  background: var(--color-chat-background);
}
button, input { font: inherit; }
button { border: 0; background: transparent; color: inherit; cursor: pointer; }
.custom-scroll, #MiddleColumn .MessageList, .right-column-content { scrollbar-width: thin; scrollbar-color: rgba(112,117,121,.38) transparent; }
.custom-scroll::-webkit-scrollbar, #MiddleColumn .MessageList::-webkit-scrollbar, .right-column-content::-webkit-scrollbar { width: 6px; }
.custom-scroll::-webkit-scrollbar-thumb, #MiddleColumn .MessageList::-webkit-scrollbar-thumb, .right-column-content::-webkit-scrollbar-thumb { background: rgba(112,117,121,.38); border-radius: 999px; }
#Main {
  overflow: hidden;
  height: 100%;
  text-align: left;
  display: grid;
  grid-template-columns: minmax(16rem, 26.5rem) 1fr;
  grid-template-rows: 100%;
}
#LeftColumn {
  --left-column-min-width: 16rem;
  --left-column-max-width: 26.5rem;
  position: relative;
  overflow: hidden;
  width: 33vw;
  min-width: var(--left-column-min-width);
  max-width: var(--left-column-max-width);
  height: 100%;
  background-color: var(--color-background);
}
#MiddleColumn {
  position: relative;
  overflow: hidden;
  height: 100%;
  border-left: 1px solid var(--color-borders);
  background: var(--color-chat-background);
}
.LeftMainHeader, .MiddleHeader, .RightHeader {
  height: 3.5rem;
  display: flex;
  align-items: center;
  gap: .625rem;
  padding: 0 .8125rem;
  background: var(--color-background);
  box-shadow: 0 1px 2px rgba(0, 0, 0, .08);
  position: relative;
  z-index: 2;
}
.MiddleHeader .info { min-width: 0; flex: 1; }
.MiddleHeader .title, .RightHeader .title { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.MiddleHeader .subtitle, .RightHeader .subtitle { margin-top: .125rem; color: var(--color-text-secondary); font-size: .8125rem; }
.Button.round, .HeaderActions .Button { width: 2.5rem; height: 2.5rem; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: var(--color-text-secondary); transition: background-color 150ms ease, color 150ms ease; }
.Button.round:hover, .HeaderActions .Button:hover { background-color: var(--color-chat-hover); color: var(--color-text); }
.input-search {
  flex: 1;
  height: 2.5rem;
  border-radius: 1.375rem;
  background: #f1f3f4;
  display: flex;
  align-items: center;
  gap: .625rem;
  padding: 0 .875rem;
  color: var(--color-text-secondary);
}
.input-search:focus-within { background: var(--color-background); box-shadow: inset 0 0 0 2px var(--color-primary); }
.input-search input { min-width: 0; width: 100%; border: 0; outline: 0; background: transparent; color: var(--color-text); }
.chat-list { height: calc(100% - 3.5rem); overflow: auto; padding: .5rem .4375rem; }
.ListItem.chat-item-button {
  display: flex;
  align-items: center;
  gap: .75rem;
  min-height: 4.5rem;
  padding: .5rem;
  border-radius: var(--border-radius-default);
  cursor: pointer;
  user-select: none;
  transition: background-color 120ms ease;
}
.ListItem.chat-item-button:hover { background: var(--color-chat-hover); }
.ListItem.chat-item-button.selected { background: var(--color-primary); color: #fff; }
.Avatar {
  flex: 0 0 auto;
  width: 3.375rem;
  height: 3.375rem;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 600;
  font-size: 1.125rem;
  background: linear-gradient(135deg, #6bb8ff, #5e72e4);
}
.MiddleHeader .Avatar { width: 2.625rem; height: 2.625rem; font-size: .9375rem; }
.chat-item-title { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chat-item-info { min-width: 0; flex: 1; }
.chat-item-row { display: flex; align-items: center; justify-content: space-between; gap: .75rem; }
.chat-item-subtitle { margin-top: .25rem; color: var(--color-text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ListItem.selected .chat-item-subtitle { color: rgba(255, 255, 255, .82); }
.badge { min-width: 1.375rem; height: 1.375rem; padding: 0 .4375rem; border-radius: .6875rem; background: #c4c9cc; color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 600; }
.ListItem.selected .badge { background: #fff; color: var(--color-primary); }
.messages-layout { height: 100%; display: flex; flex-direction: column; }
.MessageList {
  position: relative;
  flex: 1;
  overflow: auto;
  padding: .75rem 0 1.25rem;
  background-color: var(--color-chat-background);
  background-image: radial-gradient(circle at 25% 25%, rgba(255,255,255,.75) 0 1px, transparent 1.35px), radial-gradient(circle at 72% 64%, rgba(255,255,255,.62) 0 1px, transparent 1.35px);
  background-size: 6.25rem 6.25rem, 8rem 8rem;
}
.messages-container { width: min(45.5rem, 100%); margin: 0 auto; padding: 0 1rem; }
.local-action-message, .date { display: flex; justify-content: center; margin: .375rem 0; }
.local-action-message > span, .date > span {
  max-width: 86%;
  padding: .25rem .625rem;
  border-radius: 1rem;
  color: white;
  background: rgba(112,117,121,.72);
  box-shadow: 0 1px 1px rgba(0,0,0,.08);
  font-size: .8125rem;
  line-height: 1.25rem;
  text-align: center;
}
.local-action-message.alert > span { background: rgba(220, 80, 70, .82); }
.local-action-message.audit > span { background: rgba(220, 150, 42, .86); }
.local-action-message.deleted > span { background: rgba(126, 132, 136, .82); }
.Message {
  --background-color: var(--color-background);
  --hover-color: var(--color-reply-hover);
  --active-color: var(--color-reply-active);
  --max-width: 29rem;
  --accent-color: var(--color-primary);
  --secondary-color: var(--color-text-secondary);
  --deleting-translate-x: -50%;
  --border-top-left-radius: var(--border-radius-messages);
  --border-top-right-radius: var(--border-radius-messages);
  --border-bottom-left-radius: var(--border-radius-messages);
  --border-bottom-right-radius: var(--border-radius-messages);
  position: relative;
  display: flex;
  align-items: flex-end;
  margin-bottom: .375rem;
  padding-left: 2.5rem;
}
.Message.own {
  --background-color: var(--color-background-own);
  --hover-color: var(--color-reply-own-hover);
  --active-color: var(--color-reply-own-active);
  --max-width: 30rem;
  --accent-color: var(--color-message-meta-own);
  --secondary-color: var(--color-message-meta-own);
  --deleting-translate-x: 50%;
  flex-direction: row-reverse;
  padding-left: 0;
}
.Message.first-in-group:not(.last-in-group):not(.own) { --border-bottom-left-radius: var(--border-radius-messages-small); }
.Message:not(.first-in-group):not(.last-in-group):not(.own) { --border-top-left-radius: var(--border-radius-messages-small); --border-bottom-left-radius: var(--border-radius-messages-small); }
.Message.last-in-group:not(.first-in-group):not(.own) { --border-top-left-radius: var(--border-radius-messages-small); --border-bottom-left-radius: var(--border-radius-messages-small); }
.Message.own.first-in-group:not(.last-in-group) { --border-bottom-right-radius: var(--border-radius-messages-small); }
.Message.own:not(.first-in-group):not(.last-in-group) { --border-top-right-radius: var(--border-radius-messages-small); --border-bottom-right-radius: var(--border-radius-messages-small); }
.Message.own.last-in-group:not(.first-in-group) { --border-top-right-radius: var(--border-radius-messages-small); --border-bottom-right-radius: var(--border-radius-messages-small); }
.Message.last-in-group { margin-bottom: .625rem; }
.Message > .Avatar { position: absolute; bottom: 0; left: 0; width: 2.125rem; height: 2.125rem; font-size: .8125rem; }
.Message:not(.last-in-group) > .Avatar, .Message.own > .Avatar { display: none; }
.message-content-wrapper { max-width: min(var(--max-width), calc(100% - 1rem)); transform: scale(1) translateX(0); opacity: 1; transition: transform var(--select-transition); }
.message-content {
  position: relative;
  min-width: 3.75rem;
  padding: .375rem .5rem 1.1875rem;
  border-radius: var(--border-top-left-radius) var(--border-top-right-radius) var(--border-bottom-right-radius) var(--border-bottom-left-radius);
  background: var(--background-color);
  box-shadow: 0 1px 2px rgba(0,0,0,.16);
  overflow-wrap: anywhere;
  word-break: break-word;
  cursor: context-menu;
}
.message-content:hover { background: var(--hover-color); }
.Message.has-menu-open .message-content, .Message.is-selected .message-content { background: var(--active-color); }
.message-title { margin-bottom: .125rem; color: var(--accent-color); font-weight: 600; font-size: .875rem; }
.text-content { white-space: pre-wrap; line-height: 1.3125rem; }
.message-time { position: absolute; right: .5rem; bottom: .1875rem; color: var(--secondary-color); font-size: .6875rem; line-height: 1; white-space: nowrap; }
.message-time .message-status { margin-left: .1875rem; font-size: .75rem; }
.MessageContextMenu {
  user-select: none;
  position: fixed;
  z-index: var(--z-menu);
  display: none;
  font-size: 1rem;
}
.MessageContextMenu.open { display: block; }
.MessageContextMenu .bubble {
  overflow: initial;
  display: flex;
  flex-direction: column;
  min-width: 15rem;
  padding: .25rem 0 !important;
  border-radius: var(--border-radius-default);
  background: var(--color-background-compact-menu);
  backdrop-filter: blur(10px);
  box-shadow: 0 .25rem .5rem .125rem var(--color-default-shadow);
}
.MenuItem {
  display: flex;
  align-items: center;
  gap: .875rem;
  height: 2.5rem;
  padding: 0 1rem;
  color: var(--color-text);
  cursor: pointer;
}
.MenuItem:hover { background: var(--color-chat-hover); }
.MenuItem.destructive { color: #df3f40; }
.MenuSeparator { height: 1px; margin: .25rem .75rem; background: var(--color-borders); }
#RightColumn-wrapper {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  z-index: 10;
  width: min(26.5rem, 100%);
  transform: translateX(105%);
  transition: transform var(--layer-transition);
  background: var(--color-background);
  box-shadow: -4px 0 18px rgba(0,0,0,.18);
}
#RightColumn-wrapper.open { transform: translateX(0); }
.right-column-content { height: calc(100% - 3.5rem); overflow: auto; padding: .75rem; background: #f4f6f8; }
.flow-row { margin-bottom: .5rem; padding: .625rem .75rem; border-left: .1875rem solid var(--color-borders); border-radius: var(--border-radius-default); background: var(--color-background); box-shadow: 0 1px 1px rgba(0,0,0,.08); }
.flow-row.user { border-left-color: var(--color-primary); }
.flow-row.cs { border-left-color: var(--color-message-meta-own); }
.flow-row.alert { border-left-color: #df3f40; }
.flow-row.audit { border-left-color: #dd962a; }
.flow-time { margin-bottom: .25rem; color: var(--color-text-secondary); font-size: .75rem; }
.flow-text { font-size: .8125rem; line-height: 1.25rem; white-space: pre-wrap; overflow-wrap: anywhere; }
.empty-placeholder { height: 100%; display: grid; place-items: center; color: var(--color-text-secondary); font-weight: 600; }
@media (max-width: 925px) {
  #Main { display: block; }
  #LeftColumn { position: fixed; z-index: 5; top: 0; left: 0; width: 26.5rem !important; transform: translate3d(-5rem,0,0); transition: transform var(--layer-transition); }
  #MiddleColumn { position: fixed; inset: 0; transition: transform var(--layer-transition); }
  #Main.left-column-open #LeftColumn { transform: translate3d(0,0,0); }
  #Main.left-column-open #MiddleColumn { transform: translate3d(26.5rem,0,0); }
}
@media (max-width: 600px) {
  #LeftColumn { width: 100vw !important; max-width: none; transform: translate3d(-20vw,0,0); }
  #Main.left-column-open #MiddleColumn { transform: translate3d(100vw,0,0); }
  .messages-container { padding: 0 .5rem; }
  .Message { padding-left: 2.875rem; margin-bottom: .25rem; }
  .Message.own { padding-right: .25rem; }
  .message-content-wrapper { max-width: min(var(--max-width), calc(100vw - 4.5rem)); }
}
</style>
</head>
<body>
<div id="Main" class="left-column-open">
  <aside id="LeftColumn">
    <div class="LeftMainHeader">
      <button class="Button round" title="刷新" onclick="loadGroups()">☰</button>
      <label class="input-search"><span>⌕</span><input id="sideSearch" placeholder="Search" autocomplete="off" oninput="renderGroups()"></label>
    </div>
    <div class="chat-list custom-scroll" id="chatList"></div>
  </aside>
  <main id="MiddleColumn">
    <div class="messages-layout">
      <header class="MiddleHeader">
        <button class="Button round" title="会话列表" onclick="openLeftColumn()">‹</button>
        <div class="Avatar" id="headAvatar">L</div>
        <div class="info"><div class="title" id="headTitle">全部消息</div><div class="subtitle" id="headSub">正在加载…</div></div>
        <div class="HeaderActions"><button class="Button" onclick="loadMessages()" title="刷新">↻</button><button class="Button" onclick="scrollBottom()" title="到底部">⌄</button></div>
      </header>
      <section class="MessageList custom-scroll" id="messages"></section>
    </div>
    <aside id="RightColumn-wrapper">
      <div class="RightHeader"><button class="Button round" onclick="closeFlow()">×</button><div><div class="title" id="flowTitle">消息流</div><div class="subtitle" id="flowSub">关联日志</div></div></div>
      <div class="right-column-content custom-scroll" id="flowBody"></div>
    </aside>
  </main>
</div>
<div class="MessageContextMenu" id="ctxMenu">
  <div class="bubble">
    <button class="MenuItem" onclick="openFlow()"><span>💬</span><span>查看消息流</span></button>
    <button class="MenuItem" onclick="copyText()"><span>📋</span><span>复制文本</span></button>
    <div class="MenuSeparator"></div>
    <button class="MenuItem destructive" id="ctxMissed" onclick="reportBug('漏回误报')"><span>⚠️</span><span>漏回误报反馈</span></button>
    <button class="MenuItem destructive" id="ctxFalse" onclick="reportBug('预警误报')"><span>🚩</span><span>预警误报反馈</span></button>
  </div>
</div>
<script>
let groups=[];let allLogs=[];let activeChatId=null;let activeChatName='全部消息';let ctxTarget=null;
const colors=['#6bb8ff','#ff8a65','#ba68c8','#4db6ac','#ffd54f','#7986cb','#f06292','#81c784'];
function hcol(s){let h=0;for(const c of String(s||''))h=(h*31+c.charCodeAt(0))|0;return colors[Math.abs(h)%colors.length];}
function escH(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function stripDate(raw){return String(raw||'').replace(/^\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}\s+/,'').trim();}
function closeLeftColumn(){document.getElementById('Main').classList.remove('left-column-open');}
function openLeftColumn(){document.getElementById('Main').classList.add('left-column-open');}
async function loadGroups(){
  const list=document.getElementById('chatList');list.innerHTML='<div class="empty-placeholder">加载中…</div>';
  try{groups=await fetch('/log_groups').then(r=>r.json());renderGroups();}
  catch(e){list.innerHTML='<div class="empty-placeholder">群组加载失败</div>';}
}
function renderGroups(){
  const q=(document.getElementById('sideSearch').value||'').toLowerCase().trim();
  const list=document.getElementById('chatList');
  const items=[{chat_id:null,name:'全部消息',count:allLogs.length||0}].concat(groups).filter(g=>!q||String(g.name||g.chat_id).toLowerCase().includes(q));
  list.innerHTML=items.map(g=>{
    const active=(String(g.chat_id||'')===String(activeChatId||''));
    const name=escH(g.name||g.chat_id||'全部消息'); const ini=escH(String(g.name||'L').charAt(0).toUpperCase());
    return `<div class="ListItem chat-item-button ${active?'selected':''}" onclick="selectGroup(${g.chat_id===null?'null':g.chat_id}, '${encodeURIComponent(g.name||'全部消息')}')">
      <div class="Avatar" style="background:${hcol(g.name||g.chat_id||'all')}">${ini}</div>
      <div class="chat-item-info"><div class="chat-item-row"><div class="chat-item-title">${name}</div><span class="badge">${g.count||0}</span></div><div class="chat-item-subtitle">${g.chat_id||'所有会话'} · 日志</div></div>
    </div>`;
  }).join('')||'<div class="empty-placeholder">没有匹配的会话</div>';
}
function selectGroup(id,name){activeChatId=id;activeChatName=decodeURIComponent(name||'全部消息');closeLeftColumn();updateHead();loadMessages();renderGroups();}
function updateHead(){document.getElementById('headTitle').textContent=activeChatName;document.getElementById('headAvatar').textContent=(activeChatName||'L').charAt(0).toUpperCase();document.getElementById('headAvatar').style.background=hcol(activeChatName);}
async function loadMessages(){
  const el=document.getElementById('messages');el.innerHTML='<div class="empty-placeholder">加载中…</div>';
  const url='/log_db?limit=800'+(activeChatId?'&chat_id='+activeChatId:'');
  try{allLogs=await fetch(url).then(r=>r.json());document.getElementById('headSub').textContent=allLogs.length+' 条消息';render();renderGroups();scrollBottom();}
  catch(e){el.innerHTML='<div class="empty-placeholder">加载失败</div>';}
}
function parseLog(row){
  const raw=row.raw||'';const time=(raw.match(/(\d{2}:\d{2}:\d{2})/)||[])[1]||'';const msgId=(raw.match(/Msg[=\(](\d+)/)||[])[1]||null;
  let sn='',tx='';const m=raw.match(/\[(-?\d+)\]\s+(.+?):\s+(.*)/);
  if(m){sn=m[2];tx=m[3];}else tx=stripDate(raw);
  if(row.msg_type==='cs'&&!sn)tx=raw.replace(/^.*?\[\+\]\s*/,'').trim();
  if(row.msg_type==='deleted'&&!sn)tx=raw.replace(/^.*?\[DELETED\]\s*/,'').trim();
  return {...row,time,msgId,sn,tx};
}
function render(){
  const el=document.getElementById('messages');
  if(!allLogs.length){el.innerHTML='<div class="empty-placeholder">暂无消息</div>';return;}
  const logs=allLogs.map(parseLog);let html='<div class="messages-container">',lastDate='',lastSender='',lastType='';
  logs.forEach((e,i)=>{const next=logs[i+1];const d=new Date((e.ts||0)*1000).toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});if(d!==lastDate){html+=`<div class="date"><span>${d}</span></div>`;lastDate=d;lastSender='';lastType='';}
    const type=e.msg_type||'sys';const first=lastSender!==e.sn||lastType!==type;const last=!next||(next.msg_type||'sys')!==type||next.sn!==e.sn;lastSender=e.sn;lastType=type;html+=renderEntry(e,i,first,last);});
  el.innerHTML=html+'</div>';
}
function renderEntry(e,i,first,last){
  const type=e.msg_type||'sys';const id='msg-'+i;
  if(type==='alert'||type==='audit'||type==='deleted')return `<div class="local-action-message ${type}" id="${id}" oncontextmenu="showCtx(event,${i})"><span>${type==='deleted'?'🗑️ ':''}${escH(e.tx)}</span></div>`;
  const own=type==='cs';const name=e.sn||'用户';const color=hcol(name);const title=(!own&&first&&e.sn)?`<div class="message-title" style="color:${color}">${escH(e.sn)}</div>`:'';const avatar=own?'':`<div class="Avatar" style="background:${color}">${escH(name.charAt(0).toUpperCase())}</div>`;
  return `<div class="Message ${own?'own':''} ${first?'first-in-group':''} ${last?'last-in-group':''}" id="${id}" data-i="${i}">${avatar}<div class="message-content-wrapper"><div class="message-content text" oncontextmenu="showCtx(event,${i})"><div class="content-inner">${title}<div class="text-content">${escH(e.tx||'')}</div><span class="message-time">${escH(e.time)}${own?'<span class="message-status">✓✓</span>':''}</span></div></div></div></div>`;
}
function showCtx(ev,i){
  ev.preventDefault();ctxTarget={i,e:parseLog(allLogs[i])};
  document.querySelectorAll('.Message.has-menu-open,.local-action-message.has-menu-open').forEach(n=>n.classList.remove('has-menu-open'));
  const row=document.getElementById('msg-'+i);if(row)row.classList.add('has-menu-open');
  const type=ctxTarget.e.msg_type;document.getElementById('ctxMissed').style.display=type==='user'?'flex':'none';document.getElementById('ctxFalse').style.display=(type==='alert'||type==='audit')?'flex':'none';
  const m=document.getElementById('ctxMenu');m.style.left=Math.min(ev.clientX,innerWidth-250)+'px';m.style.top=Math.min(ev.clientY,innerHeight-190)+'px';m.classList.add('open');
}
document.addEventListener('click',e=>{if(!e.target.closest('#ctxMenu')){document.getElementById('ctxMenu').classList.remove('open');document.querySelectorAll('.has-menu-open').forEach(n=>n.classList.remove('has-menu-open'));}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('ctxMenu').classList.remove('open');closeFlow();}});
function copyText(){if(ctxTarget)navigator.clipboard.writeText(ctxTarget.e.tx||ctxTarget.e.raw||'');document.getElementById('ctxMenu').classList.remove('open');}
function relatedRows(e){const mid=e.msgId;if(!mid)return[];const token='Msg='+mid;const alt='Msg('+mid;return allLogs.filter(r=>r.raw&&(r.raw.includes(token)||r.raw.includes(alt)));}
function openFlow(){
  if(!ctxTarget)return;const e=ctxTarget.e;const rel=relatedRows(e);document.getElementById('flowTitle').textContent=e.msgId?'Msg='+e.msgId+' 消息流':'消息流';document.getElementById('flowSub').textContent=rel.length?rel.length+' 条关联日志':'未找到关联日志';
  const body=document.getElementById('flowBody');body.innerHTML=rel.length?rel.map(r=>{const p=parseLog(r);return `<div class="flow-row ${p.msg_type||'sys'}"><div class="flow-time">${escH(p.time)} · ${escH(p.msg_type||'sys')}</div><div class="flow-text">${escH(stripDate(p.raw))}</div></div>`;}).join(''):'<div class="empty-placeholder" style="height:10rem">此条目没有可关联的 Msg ID</div>';
  document.getElementById('RightColumn-wrapper').classList.add('open');document.getElementById('ctxMenu').classList.remove('open');
}
function closeFlow(){document.getElementById('RightColumn-wrapper').classList.remove('open');}
function reportBug(type){
  if(!ctxTarget)return;const e=ctxTarget.e,mid=e.msgId,cTs=e.ts||0;let lines=['=== '+type+'反馈报告 ===','涉及 Msg: '+(mid||'未知'),''];
  const rel=relatedRows(e);if(rel.length){lines.push('-- 关联记录 --');rel.forEach(r=>{const p=parseLog(r);lines.push('['+p.time+'] '+stripDate(p.raw));});lines.push('');}
  lines.push('-- 时间窗口 (±5分钟) --');allLogs.filter(r=>Math.abs((r.ts||0)-cTs)<=300).forEach(r=>{const p=parseLog(r);lines.push('['+p.time+'] '+stripDate(p.raw));});
  navigator.clipboard.writeText(lines.join('\n')).then(()=>alert('已复制 ['+type+'] 详情'));document.getElementById('ctxMenu').classList.remove('open');
}
function doSearch(){const term=(document.getElementById('sideSearch').value||'').toLowerCase().trim();if(!term)return;let found=false;Array.from(document.querySelectorAll('.Message')).reverse().forEach(row=>{if(row.textContent.toLowerCase().includes(term)){row.scrollIntoView({behavior:'smooth',block:'center'});found=true;return;}});}
document.getElementById('sideSearch').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
function scrollBottom(){const m=document.getElementById('messages');m.scrollTop=m.scrollHeight;}
updateHead();loadGroups();loadMessages();
</script>
</body>
</html>
