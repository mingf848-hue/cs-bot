<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CS Bot Unlock</title>
  <style>
    body { width: 360px; margin: 0; padding: 14px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #111827; background: #f8fafc; }
    h1 { margin: 0 0 10px; font-size: 16px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
    .status { font-weight: 700; }
    .muted { color: #64748b; font-size: 12px; margin-top: 4px; word-break: break-all; white-space: pre-line; }
    .row { display: flex; gap: 10px; align-items: center; justify-content: space-between; }
    .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button { width: 100%; border: 0; border-radius: 7px; padding: 9px 10px; font-weight: 800; cursor: pointer; background: #2563eb; color: #fff; }
    button.secondary { background: #eef2ff; color: #3730a3; }
    button.danger { background: #fee2e2; color: #991b1b; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .toggle { width: 18px; height: 18px; margin: 0; }
    .switch-label { font-weight: 800; }
    .pill { display: inline-flex; align-items: center; gap: 6px; min-height: 22px; border-radius: 999px; padding: 0 8px; background: #f1f5f9; color: #475569; font-size: 12px; font-weight: 800; }
    .pill.on { background: #dcfce7; color: #166534; }
  </style>
</head>
<body>
  <h1>CS Bot Unlock</h1>
  <div class="card">
    <div class="status" id="status">加载中</div>
    <div class="muted" id="detail"></div>
    <div class="muted">更新扩展后请刷新一次后台页面，用来捕获最新登录态和请求头。</div>
  </div>
  <div class="card">
    <label class="row">
      <span class="switch-label">启用轮询</span>
      <input class="toggle" type="checkbox" id="enabled">
    </label>
  </div>
  <button id="poll">立即轮询</button>
  <div class="card" style="margin-top:10px;">
    <div class="row">
      <span class="switch-label">接口录制器</span>
      <span class="pill" id="recorderBadge">未录制</span>
    </div>
    <div class="muted" id="recorderDetail">打开后台页面后开始录制，手动操作一遍，再导出 JSON。</div>
    <div class="button-grid" style="margin-top:10px;">
      <button id="recStart">开始录制</button>
      <button id="recStop" class="secondary">停止录制</button>
      <button id="recExport" class="secondary">导出 JSON</button>
      <button id="recClear" class="danger">清空记录</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
